<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Generator Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Gray scale */
      --gray-50: #f5f5f6;
      --gray-100: #f0f1f1;
      --gray-200: #e1e2e5;
      --gray-300: #c1c4cc;
      --gray-400: #8b8fa3;
      --gray-500: #6c7080;
      --gray-600: #4a4e5c;
      --gray-700: #2a2e3d;
      --gray-800: #1e2130;
      --gray-900: #161822;
      --gray-950: #0f1117;

      /* Surfaces */
      --bg: var(--gray-950);
      --surface: #1a1d28;
      --surface-secondary: #161822;
      --surface-hover: #222533;
      --border: #2a2e3d;
      --border-subtle: #222536;

      /* Text */
      --text: #ececf1;
      --text-secondary: #a1a3b0;
      --text-dim: #8b8fa3;
      --text-placeholder: #5c6070;

      /* Primary */
      --primary-25: rgba(108, 92, 231, 0.06);
      --primary-50: rgba(108, 92, 231, 0.1);
      --primary-100: rgba(108, 92, 231, 0.16);
      --primary-200: rgba(108, 92, 231, 0.24);
      --primary-300: #8b7cf0;
      --primary: #6c5ce7;
      --primary-hover: #7b6df0;
      --primary-600: #5a49d6;
      --primary-700: #4a38c2;

      /* Semantic */
      --success: #12b886;
      --success-bg: rgba(18, 184, 134, 0.1);
      --success-border: rgba(18, 184, 134, 0.2);
      --warning: #fab005;
      --warning-bg: rgba(250, 176, 5, 0.1);
      --warning-border: rgba(250, 176, 5, 0.2);
      --danger: #e05252;
      --danger-bg: rgba(224, 82, 82, 0.1);
      --danger-border: rgba(224, 82, 82, 0.2);

      /* Shadows */
      --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.24);
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.3), 0 1px 2px -1px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.35), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.35);

      /* Focus ring */
      --ring-color: rgba(108, 92, 231, 0.4);

      /* Radius */
      --radius-sm: 6px;
      --radius: 8px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-full: 9999px;

      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app { max-width: 1200px; margin: 0 auto; padding: 32px 28px; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 36px;
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    header h1 span { color: var(--primary); }

    nav { display: flex; gap: 6px; }
    nav button {
      background: transparent; border: 1px solid transparent; color: var(--text-secondary);
      padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 14px;
      font-weight: 500; font-family: inherit;
      transition: all var(--transition-fast);
    }
    nav button:hover { background: var(--surface); color: var(--text); }
    nav button.active {
      background: var(--primary); border-color: var(--primary); color: white;
      box-shadow: var(--shadow-xs);
    }

    .card {
      background: var(--surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.01em; }
    .card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--text-secondary);
      margin-bottom: 6px; font-weight: 500;
    }

    input, select, textarea {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    input::placeholder, textarea::placeholder { color: var(--text-placeholder); }
    input:hover:not(:focus), select:hover:not(:focus), textarea:hover:not(:focus) {
      border-color: var(--gray-600);
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring-color);
    }
    textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

    .checkbox-group {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 12px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .checkbox-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring-color);
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text); cursor: pointer; padding: 2px 0;
    }
    .checkbox-label input[type="checkbox"] {
      width: auto; margin: 0; accent-color: var(--primary); cursor: pointer;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius); font-size: 14px;
      font-weight: 500; cursor: pointer; border: none; font-family: inherit;
      transition: all var(--transition-fast); white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: var(--shadow-xs);
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:active {
      background: var(--primary-600);
      box-shadow: none; transform: translateY(0.5px);
    }
    .btn-danger {
      background: var(--danger); color: white;
      box-shadow: var(--shadow-xs);
    }
    .btn-danger:hover { background: #c94444; box-shadow: var(--shadow-sm); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: var(--radius-sm); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    }
    .btn-outline:hover {
      background: var(--surface-hover); border-color: var(--gray-600); color: var(--text);
    }
    .btn-outline:active { background: var(--surface); transform: translateY(0.5px); }

    .progress-list { list-style: none; }
    .progress-list li {
      padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 14px; font-size: 14px;
    }
    .progress-list li:last-child { border-bottom: none; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
    }
    .status-pending { background: var(--gray-700); }
    .status-running {
      background: var(--warning);
      box-shadow: 0 0 0 3px var(--warning-border);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-done { background: var(--success); box-shadow: 0 0 0 3px var(--success-border); }
    .status-error { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-border); }
    .status-skip { background: var(--gray-600); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .client-list { display: grid; gap: 10px; }
    .client-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 18px 20px;
      box-shadow: var(--shadow-xs);
      transition: all var(--transition-fast);
    }
    .client-item:hover {
      border-color: var(--border);
      box-shadow: var(--shadow-md);
      background: var(--surface-hover);
    }
    .client-item h3 { font-size: 15px; margin-bottom: 4px; font-weight: 600; }
    .client-item p { font-size: 13px; color: var(--text-dim); }

    .markdown-preview {
      background: var(--surface-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 28px;
      max-height: 600px; overflow-y: auto; font-size: 14px;
      line-height: 1.8; white-space: pre-wrap;
    }

    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .meta-item {
      background: var(--surface-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .meta-item label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    .meta-item p { font-size: 14px; margin-top: 6px; color: var(--text); }

    .empty-state {
      text-align: center; padding: 64px 48px; color: var(--text-dim);
    }
    .empty-state p { font-size: 15px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 500; letter-spacing: 0.01em;
    }
    .badge-posts {
      background: var(--primary-50); color: var(--primary-300);
      border: 1px solid var(--primary-100);
    }
    .badge-sources {
      background: var(--success-bg); color: var(--success);
      border: 1px solid var(--success-border);
    }

    .platform-list { display: grid; gap: 10px; margin-top: 16px; }
    .platform-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius); padding: 14px 16px;
      transition: border-color var(--transition-fast);
    }
    .platform-item:hover { border-color: var(--border); }
    .platform-item .platform-info { flex: 1; }
    .platform-item .platform-info h4 { font-size: 13px; font-weight: 600; }
    .platform-item .platform-info p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .content-items-grid {
      display: grid; gap: 6px; margin-top: 16px; max-height: 300px; overflow-y: auto;
    }
    .content-item-row {
      background: var(--surface-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px;
      transition: border-color var(--transition-fast);
    }
    .content-item-row:hover { border-color: var(--border); }
    .content-item-row .ci-title { font-weight: 500; }
    .content-item-row .ci-meta { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

    .connector-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius); padding: 14px 16px;
      transition: border-color var(--transition-fast);
    }
    .connector-item:hover { border-color: var(--border); }
    .connector-item .connector-info { flex: 1; }
    .connector-item .connector-info h4 { font-size: 13px; font-weight: 600; }
    .connector-item .connector-info p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .connector-actions { display: flex; gap: 8px; align-items: center; }

    .toggle-switch {
      position: relative; width: 40px; height: 22px; cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--gray-700);
      border-radius: 11px; transition: background var(--transition-base);
    }
    .toggle-slider::before {
      content: ''; position: absolute; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background: white;
      border-radius: 50%; transition: transform var(--transition-base);
      box-shadow: var(--shadow-xs);
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--success); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

    .publish-results { margin-top: 16px; }
    .publish-result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--surface-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 8px;
    }
    .publish-result-item .pr-status { font-weight: 600; }
    .publish-result-item .pr-success { color: var(--success); }
    .publish-result-item .pr-error { color: var(--danger); }
    .publish-result-item .pr-skipped { color: var(--text-dim); }
    .publish-result-item a {
      color: var(--primary-300); text-decoration: none;
      transition: color var(--transition-fast);
    }
    .publish-result-item a:hover { color: var(--primary); text-decoration: underline; }

    .connector-config-fields { display: none; margin-top: 12px; }
    .connector-config-fields.active { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-600); }

    /* Selection */
    ::selection { background: var(--primary-200); color: var(--text); }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <h1><span>●</span> Blog Generator Engine</h1>
      <nav>
        <button class="active" onclick="showPage('generate')">Generate</button>
        <button onclick="showPage('clients')">Clients</button>
      </nav>
    </header>
    <main id="main"></main>
  </div>

  <script>
    let currentPage = 'generate';
    let generationResult = null;
    let loadedTemplate = null;
    let clientsList = null;
    let selectedGenerateClient = null;  // { slug, businessName, hasTemplate, connectorPlatforms }
    let generateStep = 'select';        // 'select' | 'form'

    function showPage(page) {
      currentPage = page;
      if (page === 'generate') {
        // Refresh client list when navigating to generate
        clientsList = null;
      }
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelector(`nav button[onclick="showPage('${page}')"]`).classList.add('active');
      render();
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function render() {
      const main = document.getElementById('main');
      switch (currentPage) {
        case 'generate':
          // Fetch client list if needed for selection step
          if (!clientsList) {
            try {
              const res = await fetch('/api/clients/detailed');
              const data = await res.json();
              clientsList = data.clients || [];
            } catch { clientsList = []; }
          }

          if (generateStep === 'select') {
            main.innerHTML = renderClientSelection();
          } else {
            main.innerHTML = renderGenerateForm();
            const toneGroup = document.getElementById('toneGroup');
            if (toneGroup) {
              toneGroup.addEventListener('change', (e) => {
                const checked = toneGroup.querySelectorAll('input[name="tone"]:checked');
                if (checked.length > 2) {
                  e.target.checked = false;
                }
              });
            }
          }
          break;
        case 'clients': renderClients(main); break;
      }
    }

    function goBackToClientSelect() {
      selectedGenerateClient = null;
      loadedTemplate = null;
      generateStep = 'select';
      clientsList = null;  // Re-fetch fresh data
      render();
    }

    async function pickGenerateClient(slug) {
      const c = clientsList.find(x => x.slug === slug);
      if (!c) return;
      selectedGenerateClient = c;
      generateStep = 'form';

      // Load template if available
      if (c.hasTemplate) {
        try {
          const res = await fetch(`/api/templates/${slug}`);
          if (res.ok) {
            const { template } = await res.json();
            loadedTemplate = template;
          }
        } catch {}
      } else {
        loadedTemplate = null;
      }
      render();
    }

    function pickNewClient() {
      selectedGenerateClient = null;
      loadedTemplate = null;
      generateStep = 'form';
      render();
    }

    // ── Generate Page ───────────────────────────────────────────────────

    function renderClientSelection() {
      const clients = clientsList || [];
      return `
        <div class="card">
          <h2>Select a Client</h2>
          <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px">Choose an existing client to quick-generate, or create a new one.</p>
          <div class="client-list">
            ${clients.map(c => {
              const posts = c.postCount + ' post' + (c.postCount !== 1 ? 's' : '');
              const connectors = c.connectorPlatforms.length > 0
                ? c.connectorPlatforms.join(', ')
                : 'no connectors';
              const templateBadge = c.hasTemplate
                ? '<span style="color:var(--success);font-size:12px;margin-left:8px">template saved</span>'
                : '<span style="color:var(--text-dim);font-size:12px;margin-left:8px">no template</span>';
              return `
                <div class="client-item" style="cursor:pointer" onclick="pickGenerateClient('${c.slug}')">
                  <div>
                    <h3>${esc(c.businessName)}${templateBadge}</h3>
                    <p>${posts} &middot; ${connectors}</p>
                  </div>
                </div>`;
            }).join('')}
            <div class="client-item" style="cursor:pointer;border-style:dashed" onclick="pickNewClient()">
              <div>
                <h3 style="color:var(--primary)">+ Create New Client</h3>
                <p>Start from scratch with the full setup wizard</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderGenerateForm() {
      const now = new Date();
      const currentMonth = now.toLocaleString('en-US', { month: 'long', year: 'numeric' });
      const t = loadedTemplate;
      const isQuick = t !== null && selectedGenerateClient !== null;
      const clientName = selectedGenerateClient?.businessName || '';

      let headerHtml = '';
      if (selectedGenerateClient) {
        const connectors = selectedGenerateClient.connectorPlatforms?.length > 0
          ? selectedGenerateClient.connectorPlatforms.join(', ')
          : 'no connectors';
        headerHtml = `
          <div class="card" style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <h2>${esc(clientName)}</h2>
                <p style="color:var(--text-dim);font-size:13px">${connectors}</p>
              </div>
              <button class="btn btn-outline btn-sm" onclick="goBackToClientSelect()">Change Client</button>
            </div>
            ${isQuick ? `
              <div class="meta-grid" style="margin-top:16px">
                <div class="meta-item"><label>Website</label><p>${esc(t.websiteUrl)}</p></div>
                <div class="meta-item"><label>Blog URL</label><p>${esc(t.blogUrl)}</p></div>
                <div class="meta-item"><label>Industry</label><p>${esc(t.industry)}</p></div>
                <div class="meta-item"><label>Locations</label><p>${esc(t.locations.join(', '))}</p></div>
                <div class="meta-item"><label>Services</label><p>${esc(t.services.join(', '))}</p></div>
                <div class="meta-item"><label>Audience</label><p>${esc(t.targetAudience)}</p></div>
                <div class="meta-item"><label>Tone</label><p>${esc(t.tone.join(', '))}</p></div>
                <div class="meta-item"><label>Spelling</label><p>${esc(t.spellingStyle)}</p></div>
                <div class="meta-item"><label>Target Areas</label><p>${esc(t.targetAreas.join(', '))}</p></div>
                ${t.competitors?.length ? `<div class="meta-item"><label>Competitors</label><p>${esc(t.competitors.join(', '))}</p></div>` : ''}
              </div>
            ` : ''}
          </div>`;
      } else {
        headerHtml = `
          <div style="margin-bottom:16px">
            <button class="btn btn-outline btn-sm" onclick="goBackToClientSelect()">Back to client selection</button>
          </div>`;
      }

      // Quick form: only per-run fields
      if (isQuick) {
        return `
          ${headerHtml}
          <div class="card">
            <h2>Generate Blog Post</h2>
            <form onsubmit="startGeneration(event)">
              <input type="hidden" name="businessName" value="${esc(t.businessName)}" />
              <input type="hidden" name="websiteUrl" value="${esc(t.websiteUrl)}" />
              <input type="hidden" name="blogUrl" value="${esc(t.blogUrl)}" />
              <input type="hidden" name="locations" value="${esc(t.locations.join(', '))}" />
              <input type="hidden" name="industry" value="${esc(t.industry)}" />
              <input type="hidden" name="services" value="${esc(t.services.join(', '))}" />
              <input type="hidden" name="targetAudience" value="${esc(t.targetAudience)}" />
              <input type="hidden" name="targetAreas" value="${esc(t.targetAreas.join(', '))}" />
              <input type="hidden" name="competitors" value="${t.competitors?.length ? esc(t.competitors.join(', ')) : ''}" />
              <input type="hidden" name="spellingStyle" value="${esc(t.spellingStyle)}" />
              ${t.tone.map(tone => `<input type="hidden" name="tone" value="${esc(tone)}" />`).join('')}
              <div class="form-row-3">
                <div class="form-group">
                  <label>Target Month</label>
                  <input name="month" value="${currentMonth}" />
                </div>
                <div class="form-group">
                  <label>Mode</label>
                  <select name="mode">
                    ${[
                      ['standard', 'Standard (1000-1400 words)'],
                      ['authority', 'Authority (1500-2000 words)'],
                      ['longform', 'Longform (2000-3000 words)'],
                      ['conversion', 'Conversion (1000-1400 words)'],
                      ['local-domination', 'Local Domination (1200-1600 words)'],
                      ['cluster-builder', 'Cluster Builder (1000-1400 words)'],
                    ].map(([val, label]) =>
                      `<option value="${val}" ${(t?.defaultMode || 'standard') === val ? 'selected' : ''}>${label}</option>`
                    ).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>&nbsp;</label>

    async function startGeneration(e) {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('generateBtn');

      // Collect tones from either checkboxes (full form) or hidden inputs (quick form)
      const checkedTones = Array.from(form.querySelectorAll('input[name="tone"]:checked')).map(el => el.value);
      const hiddenTones = Array.from(form.querySelectorAll('input[name="tone"][type="hidden"]')).map(el => el.value);
      const selectedTones = checkedTones.length > 0 ? checkedTones : hiddenTones;
      if (selectedTones.length === 0 || selectedTones.length > 2) {
        alert('Please select 1 or 2 tones.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Generating...';

      const data = {
        businessName: form.businessName.value,
        websiteUrl: form.websiteUrl.value,
        blogUrl: form.blogUrl.value,
        locations: form.locations.value.split(',').map(s => s.trim()).filter(Boolean),
        industry: form.industry.value,
        services: form.services.value.split(',').map(s => s.trim()).filter(Boolean),
        targetAudience: form.targetAudience.value,
        tone: selectedTones,
        spellingStyle: form.spellingStyle.value,
        month: form.month.value,
        targetAreas: form.targetAreas.value.split(',').map(s => s.trim()).filter(Boolean),
        competitors: form.competitors.value ? form.competitors.value.split(',').map(s => s.trim()) : [],
        specialInstructions: form.specialInstructions.value,
        mode: form.mode.value,
      };

      const progressContainer = document.getElementById('progress-container');
      const progressList = document.getElementById('progress-list');
      const resultContainer = document.getElementById('result-container');

      progressContainer.style.display = 'block';
      resultContainer.style.display = 'none';
      progressList.innerHTML = '';

      const steps = {};

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7);
            } else if (line.startsWith('data: ')) {
              const eventData = JSON.parse(line.slice(6));

              if (eventType === 'progress') {
                const { step, total, label, status } = eventData;
                if (!steps[step]) {
                  const li = document.createElement('li');
                  li.id = `step-${step}`;
                  li.innerHTML = `<span class="status-dot status-pending"></span><span>Step ${step}/${total} — ${label}</span>`;
                  progressList.appendChild(li);
                  steps[step] = li;
                }
                const dot = steps[step].querySelector('.status-dot');
                dot.className = `status-dot status-${status === 'start' ? 'running' : status}`;
              } else if (eventType === 'complete') {
                generationResult = eventData;
                showResult(eventData);
              } else if (eventType === 'publish-start') {
                const publishCard = document.createElement('div');
                publishCard.className = 'card';
                publishCard.id = 'publish-progress';
                publishCard.innerHTML = '<h2>Publishing Drafts</h2><div class="publish-results" id="publish-results"></div>';
                document.getElementById('progress-container').appendChild(publishCard);
              } else if (eventType === 'publish-result') {
                const resultsEl = document.getElementById('publish-results');
                if (resultsEl) {
                  const r = eventData;
                  const statusClass = r.status === 'success' ? 'pr-success' : r.status === 'error' ? 'pr-error' : 'pr-skipped';
                  const statusIcon = r.status === 'success' ? '✓' : r.status === 'error' ? '✗' : '○';
                  const urlLink = r.url ? ` — <a href="${r.url}" target="_blank">View draft</a>` : '';
                  const errorMsg = r.errorMessage ? ` — ${r.errorMessage}` : '';
                  resultsEl.innerHTML += `
                    <div class="publish-result-item">
                      <span class="pr-status ${statusClass}">${statusIcon}</span>
                      <span>${r.label} (${r.platform})</span>
                      <span class="${statusClass}">${r.status}${urlLink}${errorMsg}</span>
                    </div>`;
                }
              } else if (eventType === 'publish-complete') {
                // Publishing finished
              } else if (eventType === 'error') {
                alert('Error: ' + eventData.message);
              }
            }
          }
        }
      } catch (err) {
        alert('Generation failed: ' + err.message);
      }

      // Save template if checkbox is checked
      const saveCheck = document.getElementById('saveTemplateCheck');
      if (saveCheck && saveCheck.checked && data.businessName) {
        const slug = data.businessName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        try {
          await fetch(`/api/templates/${slug}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              businessName: data.businessName,
              websiteUrl: data.websiteUrl,
              blogUrl: data.blogUrl,
              locations: data.locations,
              industry: data.industry,
              services: data.services,
              targetAudience: data.targetAudience,
              tone: data.tone,
              spellingStyle: data.spellingStyle,
              targetAreas: data.targetAreas,
              competitors: data.competitors,
              defaultMode: data.mode,
              specialInstructions: data.specialInstructions || undefined,
            }),
          });
        } catch {}
      }

      btn.disabled = false;
      btn.textContent = 'Generate Blog Post';
    }

    function showResult(data) {
      const resultContainer = document.getElementById('result-container');

      document.getElementById('result-meta').innerHTML = `

                </div>
              </div>

              <div id="connector-fields-webhook" class="connector-config-fields">
                <div class="form-group">
                  <label>Webhook URL</label>
                  <input id="connector-webhook-url" placeholder="https://hooks.zapier.com/..." />
                </div>
                <div class="form-group">
                  <label>Custom Headers (JSON, optional)</label>
                  <input id="connector-webhook-headers" placeholder='{"Authorization": "Bearer ..."}' />
                </div>
              </div>

              <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-primary btn-sm" onclick="addConnector('${slug}')">Add Connector</button>
              </div>
              <div id="connector-add-result" style="margin-top:8px;font-size:13px"></div>
            </div>
          </div>
        `;
      } catch (err) {
        detailEl.innerHTML = '<div class="card"><p style="color:var(--danger)">Failed to load client details.</p></div>';
      }
    }

    async function testPlatform(slug) {
      const url = document.getElementById('platform-url-input').value.trim();
      const type = document.getElementById('platform-type-select').value;
      const resultEl = document.getElementById('platform-test-result');
      const btn = document.getElementById('test-platform-btn');

      if (!url) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter a URL first</span>'; return; }

      btn.disabled = true;
      btn.textContent = 'Testing...';
      resultEl.innerHTML = '<span style="color:var(--text-dim)">Testing connection...</span>';

      try {
        const res = await fetch(`/api/platforms/${slug}/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, type }),
        });
        const data = await res.json();

        if (data.success) {
          resultEl.innerHTML = `<span style="color:var(--success)">Found ${data.itemCount} items (${data.type})</span>`;
        } else {
          resultEl.innerHTML = `<span style="color:var(--danger)">${data.message}</span>`;
        }
      } catch (err) {
        resultEl.innerHTML = `<span style="color:var(--danger)">Test failed: ${err.message}</span>`;
      }

      btn.disabled = false;
      btn.textContent = 'Test';
    }

    async function addPlatform(slug) {
      const url = document.getElementById('platform-url-input').value.trim();
      const type = document.getElementById('platform-type-select').value;

      if (!url) { alert('Enter a platform URL'); return; }

      try {
        await fetch(`/api/platforms/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, url, label: `${type.toUpperCase()} — ${new URL(url).hostname}` }),
        });
        renderClientDetail(slug);
      } catch (err) {
        alert('Failed to add platform: ' + err.message);
      }
    }

    async function removePlatform(slug, index) {
      if (!confirm('Remove this platform?')) return;
      await fetch(`/api/platforms/${slug}/${index}`, { method: 'DELETE' });
      renderClientDetail(slug);
    }

    async function refreshContent(slug) {
      const btn = document.getElementById('refresh-content-btn');
      btn.disabled = true;
      btn.textContent = 'Refreshing...';

      try {
        await fetch(`/api/platforms/${slug}/refresh`, { method: 'POST' });
        renderClientDetail(slug);
      } catch (err) {
        alert('Refresh failed: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Refresh All';
    }

    async function deleteClientUI(slug) {
      if (!confirm(`Delete client "${slug}" and all their data?`)) return;
      if (selectedClientSlug === slug) selectedClientSlug = null;
      await fetch(`/api/clients/${slug}`, { method: 'DELETE' });
      renderClients(document.getElementById('main'));
    }

    // ── Template Management ──────────────────────────────────────────────

    async function useTemplateForGenerate(slug) {
      try {
        const res = await fetch(`/api/templates/${slug}`);
        if (!res.ok) throw new Error('No template');
        const { template } = await res.json();
        loadedTemplate = template;

        // Fetch detailed client list for the generate flow
        const detailedRes = await fetch('/api/clients/detailed');
        const detailedData = await detailedRes.json();
        clientsList = detailedData.clients || [];

        selectedGenerateClient = clientsList.find(c => c.slug === slug) || null;
        generateStep = 'form';
        currentPage = 'generate';
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.querySelector("nav button[onclick=\"showPage('generate')\"]").classList.add('active');
        render();
      } catch (err) {
        alert('Failed to load template: ' + err.message);
      }
    }

    async function deleteClientTemplate(slug) {
      if (!confirm('Delete the saved template for this client?')) return;
      await fetch(`/api/templates/${slug}`, { method: 'DELETE' });
      renderClientDetail(slug);
    }

    async function editClientTemplate(slug) {
      try {
        const res = await fetch(`/api/templates/${slug}`);
        if (!res.ok) throw new Error('No template');
        const { template: t } = await res.json();

        const displayEl = document.getElementById(`template-display-${slug}`);
        const editEl = document.getElementById(`template-edit-${slug}`);
        if (!displayEl || !editEl) return;

        displayEl.style.display = 'none';
        editEl.style.display = 'block';
        editEl.innerHTML = `
          <form onsubmit="saveClientTemplate(event, '${slug}')">
            <div class="form-row">
              <div class="form-group">
                <label>Business Name *</label>
                <input name="businessName" required value="${esc(t.businessName)}" />
              </div>
              <div class="form-group">
                <label>Industry *</label>
                <input name="industry" required value="${esc(t.industry)}" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Website URL *</label>
                <input name="websiteUrl" required type="url" value="${esc(t.websiteUrl)}" />
              </div>
              <div class="form-group">
                <label>Blog URL *</label>
                <input name="blogUrl" required type="url" value="${esc(t.blogUrl)}" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Locations * (comma-separated)</label>
                <input name="locations" required value="${esc(t.locations.join(', '))}" />
              </div>
              <div class="form-group">
                <label>Services * (comma-separated)</label>
                <input name="services" required value="${esc(t.services.join(', '))}" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Target Audience *</label>
                <input name="targetAudience" required value="${esc(t.targetAudience)}" />
              </div>
              <div class="form-group">
                <label>Target Areas * (comma-separated)</label>
                <input name="targetAreas" required value="${esc(t.targetAreas.join(', '))}" />
              </div>
            </div>
            <div class="form-row-3">
              <div class="form-group">
                <label>Tone (select up to 2)</label>
                <div class="checkbox-group">
                  ${['Professional','Friendly','Clinical','Casual','Authoritative','Warm & Approachable'].map(tone =>
                    `<label class="checkbox-label"><input type="checkbox" name="tone" value="${tone}" ${t.tone.includes(tone) ? 'checked' : ''} /> ${tone}</label>`
                  ).join('')}
                </div>
              </div>
              <div class="form-group">
                <label>Spelling Style</label>
                <select name="spellingStyle">
                  ${['American','British','Canadian','Australian'].map(s =>
                    `<option ${t.spellingStyle === s ? 'selected' : ''}>${s}</option>`
                  ).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Default Mode</label>
                <select name="defaultMode">
                  <option value="">None</option>
                  ${[
                    ['standard', 'Standard'],
                    ['authority', 'Authority'],
                    ['longform', 'Longform'],
                    ['conversion', 'Conversion'],
                    ['local-domination', 'Local Domination'],
                    ['cluster-builder', 'Cluster Builder'],
                  ].map(([val, label]) =>
                    `<option value="${val}" ${(t.defaultMode || '') === val ? 'selected' : ''}>${label}</option>`
                  ).join('')}
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Competitors (comma-separated, optional)</label>
                <input name="competitors" value="${t.competitors?.length ? esc(t.competitors.join(', ')) : ''}" />
              </div>
            </div>
            <div class="form-group">
              <label>Special Instructions (optional)</label>
              <textarea name="specialInstructions">${t.specialInstructions || ''}</textarea>
            </div>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
              <button type="button" class="btn btn-outline btn-sm" onclick="cancelEditTemplate('${slug}')">Cancel</button>
            </div>
            <div id="template-edit-result-${slug}" style="margin-top:8px;font-size:13px"></div>
          </form>
        `;
      } catch (err) {
        alert('Failed to load template for editing: ' + err.message);
      }
    }

    function cancelEditTemplate(slug) {
      const displayEl = document.getElementById(`template-display-${slug}`);
      const editEl = document.getElementById(`template-edit-${slug}`);
      if (displayEl) displayEl.style.display = 'block';
      if (editEl) { editEl.style.display = 'none'; editEl.innerHTML = ''; }
    }

    async function saveClientTemplate(event, slug) {
      event.preventDefault();
      const form = event.target;
      const resultEl = document.getElementById(`template-edit-result-${slug}`);

      const toneChecked = Array.from(form.querySelectorAll('input[name="tone"]:checked')).map(cb => cb.value);
      if (toneChecked.length === 0) {
        resultEl.innerHTML = '<span style="color:var(--danger)">Select at least 1 tone</span>';
        return;
      }
      if (toneChecked.length > 2) {
        resultEl.innerHTML = '<span style="color:var(--danger)">Select at most 2 tones</span>';
        return;
      }

      const splitTrim = v => v.split(',').map(s => s.trim()).filter(Boolean);

      const body = {
        businessName: form.businessName.value.trim(),
        websiteUrl: form.websiteUrl.value.trim(),
        blogUrl: form.blogUrl.value.trim(),
        locations: splitTrim(form.locations.value),
        industry: form.industry.value.trim(),
        services: splitTrim(form.services.value),
        targetAudience: form.targetAudience.value.trim(),
        tone: toneChecked,
        spellingStyle: form.spellingStyle.value,
        targetAreas: splitTrim(form.targetAreas.value),
        competitors: splitTrim(form.competitors.value),
      };

      const defaultMode = form.defaultMode.value;
      if (defaultMode) body.defaultMode = defaultMode;

      const specialInstructions = form.specialInstructions.value.trim();
      if (specialInstructions) body.specialInstructions = specialInstructions;

      try {
        const res = await fetch(`/api/templates/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const data = await res.json();
          resultEl.innerHTML = `<span style="color:var(--danger)">${data.error || 'Failed to save'}</span>`;
          return;
        }
        renderClientDetail(slug);
      } catch (err) {
        resultEl.innerHTML = `<span style="color:var(--danger)">Save failed: ${err.message}</span>`;
      }
    }

    async function createTemplateFromClient(slug) {
      try {
        const res = await fetch(`/api/clients/${slug}`);
        const { client } = await res.json();
        await fetch(`/api/templates/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            businessName: client.businessName,
            websiteUrl: client.websiteUrl,
            blogUrl: client.blogUrl,
            locations: client.locations,
            industry: client.industry,
            services: client.services,
            targetAudience: client.targetAudience,
            tone: client.tone,
            spellingStyle: client.spellingStyle,
            targetAreas: client.targetAreas,
            competitors: [],
          }),
        });
        renderClientDetail(slug);
      } catch (err) {
        alert('Failed to create template: ' + err.message);
      }
    }

    // ── Connector Management ─────────────────────────────────────────────

    function updateConnectorFields() {
      const platform = document.getElementById('connector-platform').value;
      document.querySelectorAll('.connector-config-fields').forEach(el => el.classList.remove('active'));
      const fields = document.getElementById(`connector-fields-${platform}`);
      if (fields) fields.classList.add('active');
    }

    async function addConnector(slug) {
      const platform = document.getElementById('connector-platform').value;
      const label = document.getElementById('connector-label').value.trim();
      const resultEl = document.getElementById('connector-add-result');

      if (!label) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter a label</span>'; return; }

      const config = {};
      if (platform === 'medium') {
        config.integrationToken = document.getElementById('connector-medium-token').value.trim();
        if (!config.integrationToken) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter integration token</span>'; return; }
      } else if (platform === 'wordpress') {
        config.siteUrl = document.getElementById('connector-wp-url').value.trim();
        config.username = document.getElementById('connector-wp-user').value.trim();
        config.applicationPassword = document.getElementById('connector-wp-pass').value.trim();
        if (!config.siteUrl || !config.username || !config.applicationPassword) {
          resultEl.innerHTML = '<span style="color:var(--danger)">Fill in all WordPress fields</span>'; return;
        }
      } else if (platform === 'webhook') {
        config.webhookUrl = document.getElementById('connector-webhook-url').value.trim();
        if (!config.webhookUrl) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter webhook URL</span>'; return; }
        const headers = document.getElementById('connector-webhook-headers').value.trim();
        if (headers) config.headers = headers;
      }

      resultEl.innerHTML = '<span style="color:var(--text-dim)">Adding connector...</span>';

      try {
        await fetch(`/api/connectors/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, label, enabled: true, config }),
        });
        resultEl.innerHTML = '<span style="color:var(--success)">Connector added!</span>';
        renderClientDetail(slug);
      } catch (err) {
        resultEl.innerHTML = `<span style="color:var(--danger)">Failed: ${err.message}</span>`;
      }
    }

    async function removeConnector(slug, connectorId) {
      if (!confirm('Remove this connector?')) return;
      await fetch(`/api/connectors/${slug}/${connectorId}`, { method: 'DELETE' });
      renderClientDetail(slug);
    }

    async function testConnector(slug, connectorId, btn) {
      btn.disabled = true;
      btn.textContent = 'Testing...';

      try {
        const res = await fetch(`/api/connectors/${slug}/${connectorId}/test`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          btn.textContent = '✓ OK';
          btn.style.color = 'var(--success)';
        } else {
          btn.textContent = '✗ Failed';
          btn.style.color = 'var(--danger)';
          alert('Connection test failed: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        btn.textContent = '✗ Error';
        btn.style.color = 'var(--danger)';
      }

      setTimeout(() => {
        btn.textContent = 'Test';
        btn.style.color = '';
        btn.disabled = false;
      }, 3000);
    }

    async function toggleConnector(slug, connectorId, enabled) {
      try {
        const res = await fetch(`/api/connectors/${slug}`);
        const { connectors } = await res.json();
        const connector = connectors.find(c => c.id === connectorId);
        if (connector) {
          connector.enabled = enabled;
          await fetch(`/api/connectors/${slug}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(connector),
          });
        }
      } catch (err) {
        alert('Failed to update connector: ' + err.message);
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
