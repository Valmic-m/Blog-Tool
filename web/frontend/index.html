<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Generator Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #232736;
      --border: #2a2e3d;
      --text: #e4e6ed;
      --text-dim: #8b8fa3;
      --primary: #6c5ce7;
      --primary-hover: #7c6ef7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .app { max-width: 1200px; margin: 0 auto; padding: 24px; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px;
    }

    header h1 { font-size: 20px; font-weight: 600; }
    header h1 span { color: var(--primary); }

    nav { display: flex; gap: 8px; }
    nav button {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    nav button:hover { background: var(--surface-hover); }
    nav button.active { background: var(--primary); border-color: var(--primary); }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
    }

    .card h2 { font-size: 16px; margin-bottom: 16px; }
    .card h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--text-dim);
      margin-bottom: 4px; font-weight: 500;
    }

    input, select, textarea {
      width: 100%; padding: 10px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
    }
    textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .checkbox-group {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      padding: 10px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text); cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] {
      width: auto; margin: 0; accent-color: var(--primary); cursor: pointer;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius); font-size: 14px;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-list { list-style: none; }
    .progress-list li {
      padding: 8px 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; font-size: 14px;
    }
    .progress-list li:last-child { border-bottom: none; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-pending { background: var(--border); }
    .status-running { background: var(--warning); animation: pulse 1s infinite; }
    .status-done { background: var(--success); }
    .status-error { background: var(--danger); }
    .status-skip { background: var(--text-dim); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .client-list { display: grid; gap: 12px; }
    .client-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .client-item h3 { font-size: 15px; margin-bottom: 4px; }
    .client-item p { font-size: 13px; color: var(--text-dim); }

    .markdown-preview {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      max-height: 600px; overflow-y: auto; font-size: 14px;
      line-height: 1.8; white-space: pre-wrap;
    }

    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .meta-item {
      background: var(--bg); border-radius: var(--radius); padding: 12px;
    }
    .meta-item label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-item p { font-size: 14px; margin-top: 4px; }

    .empty-state {
      text-align: center; padding: 48px; color: var(--text-dim);
    }
    .empty-state p { font-size: 14px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge-posts { background: rgba(108, 92, 231, 0.2); color: var(--primary); }
    .badge-sources { background: rgba(0, 184, 148, 0.2); color: var(--success); }

    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--text);
    }
    .btn-outline:hover { background: var(--surface-hover); border-color: var(--text-dim); }

    .platform-list { display: grid; gap: 8px; margin-top: 12px; }
    .platform-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
    }
    .platform-item .platform-info { flex: 1; }
    .platform-item .platform-info h4 { font-size: 13px; font-weight: 500; }
    .platform-item .platform-info p { font-size: 12px; color: var(--text-dim); }

    .content-items-grid {
      display: grid; gap: 6px; margin-top: 12px; max-height: 300px; overflow-y: auto;
    }
    .content-item-row {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 8px 12px; font-size: 13px;
    }
    .content-item-row .ci-title { font-weight: 500; }
    .content-item-row .ci-meta { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

    .connector-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
    }
    .connector-item .connector-info { flex: 1; }
    .connector-item .connector-info h4 { font-size: 13px; font-weight: 500; }
    .connector-item .connector-info p { font-size: 12px; color: var(--text-dim); }
    .connector-actions { display: flex; gap: 6px; align-items: center; }

    .toggle-switch {
      position: relative; width: 36px; height: 20px; cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 10px; transition: 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background: var(--text);
      border-radius: 50%; transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--success); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

    .publish-results { margin-top: 12px; }
    .publish-result-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; font-size: 13px; margin-bottom: 6px;
    }
    .publish-result-item .pr-status { font-weight: 500; }
    .publish-result-item .pr-success { color: var(--success); }
    .publish-result-item .pr-error { color: var(--danger); }
    .publish-result-item .pr-skipped { color: var(--text-dim); }
    .publish-result-item a { color: var(--primary); text-decoration: none; }
    .publish-result-item a:hover { text-decoration: underline; }

    .connector-config-fields { display: none; margin-top: 12px; }
    .connector-config-fields.active { display: block; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <h1><span>●</span> Blog Generator Engine</h1>
      <nav>
        <button class="active" onclick="showPage('generate')">Generate</button>
        <button onclick="showPage('clients')">Clients</button>
      </nav>
    </header>
    <main id="main"></main>
  </div>

  <script>
    let currentPage = 'generate';
    let generationResult = null;

    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelector(`nav button[onclick="showPage('${page}')"]`).classList.add('active');
      render();
    }

    function render() {
      const main = document.getElementById('main');
      switch (currentPage) {
        case 'generate':
          main.innerHTML = renderGenerate();
          const toneGroup = document.getElementById('toneGroup');
          if (toneGroup) {
            toneGroup.addEventListener('change', (e) => {
              const checked = toneGroup.querySelectorAll('input[name="tone"]:checked');
              if (checked.length > 2) {
                e.target.checked = false;
              }
            });
          }
          break;
        case 'clients': renderClients(main); break;
      }
    }

    // ── Generate Page ───────────────────────────────────────────────────

    function renderGenerate() {
      const now = new Date();
      const currentMonth = now.toLocaleString('en-US', { month: 'long', year: 'numeric' });

      return `
        <div class="card">
          <h2>Generate Blog Post</h2>
          <form onsubmit="startGeneration(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Business Name *</label>
                <input name="businessName" required placeholder="Acme Dental Care" />
              </div>
              <div class="form-group">
                <label>Website URL *</label>
                <input name="websiteUrl" required placeholder="https://example.com" type="url" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Blog URL *</label>
                <input name="blogUrl" required placeholder="https://example.com/blog" type="url" />
              </div>
              <div class="form-group">
                <label>Broad Location(s) * (comma-separated)</label>
                <input name="locations" required placeholder="Canada, US" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Industry *</label>
                <input name="industry" required placeholder="Dental / Cosmetic Dentistry" />
              </div>
              <div class="form-group">
                <label>Services * (comma-separated)</label>
                <input name="services" required placeholder="teeth whitening, veneers, implants" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Target Audience *</label>
                <input name="targetAudience" required value="General consumers" />
              </div>
              <div class="form-group">
                <label>Target Cities/Areas * (comma-separated)</label>
                <input name="targetAreas" required placeholder="Toronto, Winnipeg, Sarnia, Stratford" />
              </div>
            </div>
            <div class="form-row-3">
              <div class="form-group">
                <label>Tone (select up to 2)</label>
                <div class="checkbox-group" id="toneGroup">
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Professional" checked /> Professional</label>
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Friendly" /> Friendly</label>
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Clinical" /> Clinical</label>
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Casual" /> Casual</label>
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Authoritative" /> Authoritative</label>
                  <label class="checkbox-label"><input type="checkbox" name="tone" value="Warm & Approachable" /> Warm & Approachable</label>
                </div>
              </div>
              <div class="form-group">
                <label>Spelling Style</label>
                <select name="spellingStyle">
                  <option>American</option>
                  <option>British</option>
                  <option>Canadian</option>
                  <option>Australian</option>
                </select>
              </div>
              <div class="form-group">
                <label>Target Month</label>
                <input name="month" value="${currentMonth}" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Mode</label>
                <select name="mode">
                  <option value="standard">Standard (1000-1400 words)</option>
                  <option value="authority">Authority (1500-2000 words)</option>
                  <option value="longform">Longform (2000-3000 words)</option>
                  <option value="conversion">Conversion (1000-1400 words)</option>
                  <option value="local-domination">Local Domination (1200-1600 words)</option>
                  <option value="cluster-builder">Cluster Builder (1000-1400 words)</option>
                </select>
              </div>
              <div class="form-group">
                <label>Competitor Websites (optional)</label>
                <input name="competitors" placeholder="https://competitor1.com, https://competitor2.com" />
              </div>
            </div>
            <div class="form-group">
              <label>Special Instructions (optional)</label>
              <textarea name="specialInstructions" placeholder="Any specific focus areas, topics to avoid, etc."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="generateBtn">Generate Blog Post</button>
          </form>
        </div>
        <div id="progress-container" style="display:none">
          <div class="card">
            <h2>Generation Progress</h2>
            <ul class="progress-list" id="progress-list"></ul>
          </div>
        </div>
        <div id="result-container" style="display:none">
          <div class="card">
            <h2>Generated Blog Post</h2>
            <div class="meta-grid" id="result-meta"></div>
            <div style="margin-top: 16px">
              <button class="btn btn-primary btn-sm" onclick="copyMarkdown()">Copy Markdown</button>
            </div>
            <div class="markdown-preview" id="result-markdown" style="margin-top: 16px"></div>
          </div>
        </div>
      `;
    }

    async function startGeneration(e) {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('generateBtn');

      const selectedTones = Array.from(form.querySelectorAll('input[name="tone"]:checked')).map(el => el.value);
      if (selectedTones.length === 0 || selectedTones.length > 2) {
        alert('Please select 1 or 2 tones.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Generating...';

      const data = {
        businessName: form.businessName.value,
        websiteUrl: form.websiteUrl.value,
        blogUrl: form.blogUrl.value,
        locations: form.locations.value.split(',').map(s => s.trim()).filter(Boolean),
        industry: form.industry.value,
        services: form.services.value.split(',').map(s => s.trim()).filter(Boolean),
        targetAudience: form.targetAudience.value,
        tone: selectedTones,
        spellingStyle: form.spellingStyle.value,
        month: form.month.value,
        targetAreas: form.targetAreas.value.split(',').map(s => s.trim()).filter(Boolean),
        competitors: form.competitors.value ? form.competitors.value.split(',').map(s => s.trim()) : [],
        specialInstructions: form.specialInstructions.value,
        mode: form.mode.value,
      };

      const progressContainer = document.getElementById('progress-container');
      const progressList = document.getElementById('progress-list');
      const resultContainer = document.getElementById('result-container');

      progressContainer.style.display = 'block';
      resultContainer.style.display = 'none';
      progressList.innerHTML = '';

      const steps = {};

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7);
            } else if (line.startsWith('data: ')) {
              const eventData = JSON.parse(line.slice(6));

              if (eventType === 'progress') {
                const { step, total, label, status } = eventData;
                if (!steps[step]) {
                  const li = document.createElement('li');
                  li.id = `step-${step}`;
                  li.innerHTML = `<span class="status-dot status-pending"></span><span>Step ${step}/${total} — ${label}</span>`;
                  progressList.appendChild(li);
                  steps[step] = li;
                }
                const dot = steps[step].querySelector('.status-dot');
                dot.className = `status-dot status-${status === 'start' ? 'running' : status}`;
              } else if (eventType === 'complete') {
                generationResult = eventData;
                showResult(eventData);
              } else if (eventType === 'publish-start') {
                const publishCard = document.createElement('div');
                publishCard.className = 'card';
                publishCard.id = 'publish-progress';
                publishCard.innerHTML = '<h2>Publishing Drafts</h2><div class="publish-results" id="publish-results"></div>';
                document.getElementById('progress-container').appendChild(publishCard);
              } else if (eventType === 'publish-result') {
                const resultsEl = document.getElementById('publish-results');
                if (resultsEl) {
                  const r = eventData;
                  const statusClass = r.status === 'success' ? 'pr-success' : r.status === 'error' ? 'pr-error' : 'pr-skipped';
                  const statusIcon = r.status === 'success' ? '✓' : r.status === 'error' ? '✗' : '○';
                  const urlLink = r.url ? ` — <a href="${r.url}" target="_blank">View draft</a>` : '';
                  const errorMsg = r.errorMessage ? ` — ${r.errorMessage}` : '';
                  resultsEl.innerHTML += `
                    <div class="publish-result-item">
                      <span class="pr-status ${statusClass}">${statusIcon}</span>
                      <span>${r.label} (${r.platform})</span>
                      <span class="${statusClass}">${r.status}${urlLink}${errorMsg}</span>
                    </div>`;
                }
              } else if (eventType === 'publish-complete') {
                // Publishing finished
              } else if (eventType === 'error') {
                alert('Error: ' + eventData.message);
              }
            }
          }
        }
      } catch (err) {
        alert('Generation failed: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Generate Blog Post';
    }

    function showResult(data) {
      const resultContainer = document.getElementById('result-container');
      resultContainer.style.display = 'block';

      document.getElementById('result-meta').innerHTML = `
        <div class="meta-item"><label>Title</label><p>${data.title}</p></div>
        <div class="meta-item"><label>Topic</label><p>${data.topic}</p></div>
        <div class="meta-item"><label>Word Count</label><p>${data.wordCount}</p></div>
        <div class="meta-item"><label>Primary Keyword</label><p>${data.primaryKeyword}</p></div>
        <div class="meta-item"><label>Cluster</label><p>${data.cluster}</p></div>
        <div class="meta-item"><label>SEO Title</label><p>${data.meta?.seoTitle || ''}</p></div>
        <div class="meta-item" style="grid-column: span 2"><label>Meta Description</label><p>${data.meta?.metaDescription || ''}</p></div>
      `;

      document.getElementById('result-markdown').textContent = data.markdown;
      resultContainer.scrollIntoView({ behavior: 'smooth' });
    }

    function copyMarkdown() {
      if (generationResult?.markdown) {
        navigator.clipboard.writeText(generationResult.markdown);
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Markdown', 2000);
      }
    }

    // ── Clients Page ────────────────────────────────────────────────────

    let selectedClientSlug = null;

    async function renderClients(main) {
      main.innerHTML = '<div class="card"><h2>Clients</h2><p style="color:var(--text-dim)">Loading...</p></div>';

      try {
        const res = await fetch('/api/clients');
        const { clients } = await res.json();

        if (clients.length === 0) {
          main.innerHTML = '<div class="empty-state"><p>No clients yet. Generate a blog post to create your first client.</p></div>';
          return;
        }

        let html = `
          <div class="card">
            <h2>Clients (${clients.length})</h2>
            <div class="client-list">
              ${clients.map(c => `
                <div class="client-item" style="cursor:pointer" onclick="showClientDetail('${c.slug}')">
                  <div>
                    <h3>${c.businessName}</h3>
                    <p>${c.slug} · <span class="badge badge-posts">${c.postCount} posts</span> · Last updated: ${new Date(c.lastUpdated).toLocaleDateString()}</p>
                  </div>
                  <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteClientUI('${c.slug}')">Delete</button>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        // If a client is selected, show detail panel
        if (selectedClientSlug) {
          html += '<div id="client-detail"><div class="card"><p style="color:var(--text-dim)">Loading content sources...</p></div></div>';
        }

        main.innerHTML = html;

        if (selectedClientSlug) {
          renderClientDetail(selectedClientSlug);
        }
      } catch (err) {
        main.innerHTML = '<div class="card"><p style="color:var(--danger)">Failed to load clients.</p></div>';
      }
    }

    function showClientDetail(slug) {
      selectedClientSlug = selectedClientSlug === slug ? null : slug;
      renderClients(document.getElementById('main'));
    }

    async function renderClientDetail(slug) {
      const detailEl = document.getElementById('client-detail');
      if (!detailEl) return;

      try {
        const [clientRes, platformRes, connectorRes] = await Promise.all([
          fetch(`/api/clients/${slug}`),
          fetch(`/api/platforms/${slug}`),
          fetch(`/api/connectors/${slug}`),
        ]);
        const { client } = await clientRes.json();
        const platformData = await platformRes.json();
        const connectorData = await connectorRes.json();

        const platforms = platformData.platforms || [];
        const items = platformData.items || [];

        detailEl.innerHTML = `
          <div class="card">
            <h2>${client.businessName} — Content Sources</h2>
            <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px">
              Connect content platforms (Medium, Substack, blog RSS, etc.) so the generator can see all existing content and avoid duplication.
            </p>

            <h3>Connected Platforms</h3>
            ${platforms.length > 0 ? `
              <div class="platform-list">
                ${platforms.map((p, i) => `
                  <div class="platform-item">
                    <div class="platform-info">
                      <h4>${p.label || p.type.toUpperCase()}</h4>
                      <p>${p.url} · ${p.itemCount || 0} items${p.lastFetched ? ` · Last fetched: ${new Date(p.lastFetched).toLocaleDateString()}` : ''}</p>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="removePlatform('${slug}', ${i})">Remove</button>
                  </div>
                `).join('')}
              </div>
            ` : '<p style="color:var(--text-dim);font-size:13px;margin-top:8px">No platforms connected yet.</p>'}

            <div style="margin-top:16px;display:flex;gap:8px;align-items:flex-end">
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label>Platform URL (RSS feed, blog URL, or sitemap)</label>
                <input id="platform-url-input" placeholder="https://medium.com/@username/feed or https://example.com/blog" />
              </div>
              <div class="form-group" style="width:140px;margin-bottom:0">
                <label>Type</label>
                <select id="platform-type-select">
                  <option value="rss">RSS Feed</option>
                  <option value="sitemap">Sitemap</option>
                  <option value="crawl">Blog Crawl</option>
                </select>
              </div>
              <button class="btn btn-outline btn-sm" onclick="testPlatform('${slug}')" id="test-platform-btn" style="white-space:nowrap">Test</button>
              <button class="btn btn-primary btn-sm" onclick="addPlatform('${slug}')" style="white-space:nowrap">Add</button>
            </div>
            <div id="platform-test-result" style="margin-top:8px;font-size:13px"></div>

            <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center">
              <h3>Discovered Content (${items.length} items)</h3>
              <button class="btn btn-outline btn-sm" onclick="refreshContent('${slug}')" id="refresh-content-btn">Refresh All</button>
            </div>
            ${items.length > 0 ? `
              <div class="content-items-grid">
                ${items.slice(0, 50).map(item => `
                  <div class="content-item-row">
                    <div class="ci-title">${item.title}</div>
                    <div class="ci-meta">
                      ${item.source} · ${item.publishedDate ? new Date(item.publishedDate).toLocaleDateString() : 'No date'}
                      ${item.topics && item.topics.length > 0 ? ` · ${item.topics.join(', ')}` : ''}
                    </div>
                  </div>
                `).join('')}
                ${items.length > 50 ? `<p style="color:var(--text-dim);font-size:12px;padding:8px">...and ${items.length - 50} more items</p>` : ''}
              </div>
            ` : `<p style="color:var(--text-dim);font-size:13px;margin-top:8px">No content discovered yet. Add a platform or click "Refresh All" to auto-discover.</p>`}
          </div>

          <div class="card">
            <h2>Publishing Connectors</h2>
            <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px">
              Connect publishing platforms to automatically create drafts when a blog post is generated.
              For platforms without APIs (Substack, Squarespace, Square), use a Webhook connector with Zapier or Make.
            </p>

            <h3>Connected Connectors</h3>
            ${(connectorData.connectors || []).length > 0 ? `
              <div class="platform-list">
                ${connectorData.connectors.map(c => `
                  <div class="connector-item">
                    <div class="connector-info">
                      <h4>${c.label}</h4>
                      <p>${c.platform}${c.lastPublishedAt ? ` · Last published: ${new Date(c.lastPublishedAt).toLocaleDateString()}` : ''}</p>
                    </div>
                    <div class="connector-actions">
                      <label class="toggle-switch">
                        <input type="checkbox" ${c.enabled ? 'checked' : ''} onchange="toggleConnector('${slug}', '${c.id}', this.checked)" />
                        <span class="toggle-slider"></span>
                      </label>
                      <button class="btn btn-outline btn-sm" onclick="testConnector('${slug}', '${c.id}', this)">Test</button>
                      <button class="btn btn-danger btn-sm" onclick="removeConnector('${slug}', '${c.id}')">Remove</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : '<p style="color:var(--text-dim);font-size:13px;margin-top:8px">No connectors configured yet.</p>'}

            <div style="margin-top:16px">
              <h3>Add Connector</h3>
              <div class="form-row" style="margin-top:8px">
                <div class="form-group" style="margin-bottom:0">
                  <label>Platform</label>
                  <select id="connector-platform" onchange="updateConnectorFields()">
                    <option value="medium">Medium</option>
                    <option value="wordpress">WordPress</option>
                    <option value="webhook">Webhook (Zapier/Make/n8n)</option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:0">
                  <label>Label</label>
                  <input id="connector-label" placeholder="e.g. Main Blog, Medium Account" />
                </div>
              </div>

              <div id="connector-fields-medium" class="connector-config-fields active">
                <div class="form-group">
                  <label>Integration Token</label>
                  <input id="connector-medium-token" type="password" placeholder="Your Medium integration token" />
                </div>
              </div>

              <div id="connector-fields-wordpress" class="connector-config-fields">
                <div class="form-row">
                  <div class="form-group">
                    <label>Site URL</label>
                    <input id="connector-wp-url" placeholder="https://yoursite.com" />
                  </div>
                  <div class="form-group">
                    <label>Username</label>
                    <input id="connector-wp-user" placeholder="admin" />
                  </div>
                </div>
                <div class="form-group">
                  <label>Application Password</label>
                  <input id="connector-wp-pass" type="password" placeholder="WordPress application password" />
                </div>
              </div>

              <div id="connector-fields-webhook" class="connector-config-fields">
                <div class="form-group">
                  <label>Webhook URL</label>
                  <input id="connector-webhook-url" placeholder="https://hooks.zapier.com/..." />
                </div>
                <div class="form-group">
                  <label>Custom Headers (JSON, optional)</label>
                  <input id="connector-webhook-headers" placeholder='{"Authorization": "Bearer ..."}' />
                </div>
              </div>

              <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-primary btn-sm" onclick="addConnector('${slug}')">Add Connector</button>
              </div>
              <div id="connector-add-result" style="margin-top:8px;font-size:13px"></div>
            </div>
          </div>
        `;
      } catch (err) {
        detailEl.innerHTML = '<div class="card"><p style="color:var(--danger)">Failed to load client details.</p></div>';
      }
    }

    async function testPlatform(slug) {
      const url = document.getElementById('platform-url-input').value.trim();
      const type = document.getElementById('platform-type-select').value;
      const resultEl = document.getElementById('platform-test-result');
      const btn = document.getElementById('test-platform-btn');

      if (!url) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter a URL first</span>'; return; }

      btn.disabled = true;
      btn.textContent = 'Testing...';
      resultEl.innerHTML = '<span style="color:var(--text-dim)">Testing connection...</span>';

      try {
        const res = await fetch(`/api/platforms/${slug}/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, type }),
        });
        const data = await res.json();

        if (data.success) {
          resultEl.innerHTML = `<span style="color:var(--success)">Found ${data.itemCount} items (${data.type})</span>`;
        } else {
          resultEl.innerHTML = `<span style="color:var(--danger)">${data.message}</span>`;
        }
      } catch (err) {
        resultEl.innerHTML = `<span style="color:var(--danger)">Test failed: ${err.message}</span>`;
      }

      btn.disabled = false;
      btn.textContent = 'Test';
    }

    async function addPlatform(slug) {
      const url = document.getElementById('platform-url-input').value.trim();
      const type = document.getElementById('platform-type-select').value;

      if (!url) { alert('Enter a platform URL'); return; }

      try {
        await fetch(`/api/platforms/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, url, label: `${type.toUpperCase()} — ${new URL(url).hostname}` }),
        });
        renderClientDetail(slug);
      } catch (err) {
        alert('Failed to add platform: ' + err.message);
      }
    }

    async function removePlatform(slug, index) {
      if (!confirm('Remove this platform?')) return;
      await fetch(`/api/platforms/${slug}/${index}`, { method: 'DELETE' });
      renderClientDetail(slug);
    }

    async function refreshContent(slug) {
      const btn = document.getElementById('refresh-content-btn');
      btn.disabled = true;
      btn.textContent = 'Refreshing...';

      try {
        await fetch(`/api/platforms/${slug}/refresh`, { method: 'POST' });
        renderClientDetail(slug);
      } catch (err) {
        alert('Refresh failed: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Refresh All';
    }

    async function deleteClientUI(slug) {
      if (!confirm(`Delete client "${slug}" and all their data?`)) return;
      if (selectedClientSlug === slug) selectedClientSlug = null;
      await fetch(`/api/clients/${slug}`, { method: 'DELETE' });
      renderClients(document.getElementById('main'));
    }

    // ── Connector Management ─────────────────────────────────────────────

    function updateConnectorFields() {
      const platform = document.getElementById('connector-platform').value;
      document.querySelectorAll('.connector-config-fields').forEach(el => el.classList.remove('active'));
      const fields = document.getElementById(`connector-fields-${platform}`);
      if (fields) fields.classList.add('active');
    }

    async function addConnector(slug) {
      const platform = document.getElementById('connector-platform').value;
      const label = document.getElementById('connector-label').value.trim();
      const resultEl = document.getElementById('connector-add-result');

      if (!label) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter a label</span>'; return; }

      const config = {};
      if (platform === 'medium') {
        config.integrationToken = document.getElementById('connector-medium-token').value.trim();
        if (!config.integrationToken) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter integration token</span>'; return; }
      } else if (platform === 'wordpress') {
        config.siteUrl = document.getElementById('connector-wp-url').value.trim();
        config.username = document.getElementById('connector-wp-user').value.trim();
        config.applicationPassword = document.getElementById('connector-wp-pass').value.trim();
        if (!config.siteUrl || !config.username || !config.applicationPassword) {
          resultEl.innerHTML = '<span style="color:var(--danger)">Fill in all WordPress fields</span>'; return;
        }
      } else if (platform === 'webhook') {
        config.webhookUrl = document.getElementById('connector-webhook-url').value.trim();
        if (!config.webhookUrl) { resultEl.innerHTML = '<span style="color:var(--danger)">Enter webhook URL</span>'; return; }
        const headers = document.getElementById('connector-webhook-headers').value.trim();
        if (headers) config.headers = headers;
      }

      resultEl.innerHTML = '<span style="color:var(--text-dim)">Adding connector...</span>';

      try {
        await fetch(`/api/connectors/${slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, label, enabled: true, config }),
        });
        resultEl.innerHTML = '<span style="color:var(--success)">Connector added!</span>';
        renderClientDetail(slug);
      } catch (err) {
        resultEl.innerHTML = `<span style="color:var(--danger)">Failed: ${err.message}</span>`;
      }
    }

    async function removeConnector(slug, connectorId) {
      if (!confirm('Remove this connector?')) return;
      await fetch(`/api/connectors/${slug}/${connectorId}`, { method: 'DELETE' });
      renderClientDetail(slug);
    }

    async function testConnector(slug, connectorId, btn) {
      btn.disabled = true;
      btn.textContent = 'Testing...';

      try {
        const res = await fetch(`/api/connectors/${slug}/${connectorId}/test`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          btn.textContent = '✓ OK';
          btn.style.color = 'var(--success)';
        } else {
          btn.textContent = '✗ Failed';
          btn.style.color = 'var(--danger)';
          alert('Connection test failed: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        btn.textContent = '✗ Error';
        btn.style.color = 'var(--danger)';
      }

      setTimeout(() => {
        btn.textContent = 'Test';
        btn.style.color = '';
        btn.disabled = false;
      }, 3000);
    }

    async function toggleConnector(slug, connectorId, enabled) {
      try {
        const res = await fetch(`/api/connectors/${slug}`);
        const { connectors } = await res.json();
        const connector = connectors.find(c => c.id === connectorId);
        if (connector) {
          connector.enabled = enabled;
          await fetch(`/api/connectors/${slug}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(connector),
          });
        }
      } catch (err) {
        alert('Failed to update connector: ' + err.message);
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
